include = ["config.toml"]

[schema]
path = "./config.schema.json"
enabled = true

# Config table: [myproject]
[[rule]]
keys = ["*"]
include = ["config.toml"]

[rule.schema]
path = "./config.schema.json"

# Entry detail object: [myproject.entries] value as inline table
[[rule]]
keys = ["*.entries.*"]
include = ["config.toml"]

[rule.schema]
path = "./config.schema.json#/definitions/EntryOptions"

# Worktree overrides: [myproject.worktrees."branch"]
[[rule]]
keys = ["*.worktrees.*"]
include = ["config.toml"]

[rule.schema]
path = "./config.schema.json#/definitions/WorktreeOverrides"
